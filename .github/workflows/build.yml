name: Build Development IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip iOS Folder
        run: |
          unzip ios.zip

      - name: Install Certificate & Profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          # Setup temporary keychain
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          
          # Import P12
          echo $P12_BASE64 | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          
          # Import Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISION_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/development.mobileprovision

      - name: Install CocoaPods
        run: |
          cd ios
          cd ..

      - name: Build Archive
        run: |
          xcodebuild archive \
            -workspace ios/Tophatboing.xcworkspace \
            -scheme Tophatboing \
            -archivePath ios/Tophatboing.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_REQUIRED=YES

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/Tophatboing.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Signed_Development_IPA
          path: output/*.ipa
